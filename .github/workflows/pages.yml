name: Deploy docs and examples to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build docs site
        run: pnpm --filter @boses/docs build
        env:
          DEPLOY_TARGET: pages
      - name: Build examples
        run: |
          for example in vanilla vue react; do
            pnpm --dir "examples/$example" exec vite build --base=./
          done
      - name: Assemble Pages artifact
        run: |
          mkdir -p site
          cp -R apps/docs/dist/. site/
          for example in vanilla vue react; do
            mkdir -p "site/examples/$example"
            cp -R "examples/$example/dist/." "site/examples/$example/"
          done
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
